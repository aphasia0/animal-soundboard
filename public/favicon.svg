<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD93D"/>
      <stop offset="100%" style="stop-color:#FF9F43"/>
    </linearGradient>
    <linearGradient id="maneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F39C12"/>
      <stop offset="100%" style="stop-color:#E67E22"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bgGrad)" stroke="#E67E22" stroke-width="2"/>
  
  <!-- Lion mane (playful spikes) -->
  <g fill="url(#maneGrad)">
    <circle cx="32" cy="8" r="6"/>
    <circle cx="48" cy="12" r="6"/>
    <circle cx="56" cy="24" r="6"/>
    <circle cx="54" cy="38" r="5"/>
    <circle cx="48" cy="50" r="5"/>
    <circle cx="16" cy="50" r="5"/>
    <circle cx="10" cy="38" r="5"/>
    <circle cx="8" cy="24" r="6"/>
    <circle cx="16" cy="12" r="6"/>
  </g>
  
  <!-- Lion face -->
  <ellipse cx="32" cy="34" rx="18" ry="16" fill="#F1C40F"/>
  
  <!-- Ears -->
  <circle cx="16" cy="26" r="6" fill="#F1C40F"/>
  <circle cx="16" cy="26" r="3" fill="#E8B923"/>
  <circle cx="48" cy="26" r="6" fill="#F1C40F"/>
  <circle cx="48" cy="26" r="3" fill="#E8B923"/>
  
  <!-- Eyes -->
  <ellipse cx="25" cy="30" rx="4" ry="5" fill="white"/>
  <ellipse cx="39" cy="30" rx="4" ry="5" fill="white"/>
  <circle cx="26" cy="31" r="2.5" fill="#2C3E50"/>
  <circle cx="40" cy="31" r="2.5" fill="#2C3E50"/>
  <circle cx="27" cy="30" r="1" fill="white"/>
  <circle cx="41" cy="30" r="1" fill="white"/>
  
  <!-- Cute nose -->
  <ellipse cx="32" cy="38" rx="4" ry="3" fill="#E74C3C"/>
  <ellipse cx="32" cy="37" rx="1.5" ry="1" fill="#F1948A" opacity="0.6"/>
  
  <!-- Happy mouth -->
  <path d="M 27 42 Q 32 48 37 42" stroke="#C0392B" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Whiskers -->
  <g stroke="#C0392B" stroke-width="1" stroke-linecap="round">
    <line x1="20" y1="38" x2="10" y2="36"/>
    <line x1="20" y1="40" x2="10" y2="42"/>
    <line x1="44" y1="38" x2="54" y2="36"/>
    <line x1="44" y1="40" x2="54" y2="42"/>
  </g>
  
  <!-- Cheek blush -->
  <ellipse cx="20" cy="38" rx="3" ry="2" fill="#F5B7B1" opacity="0.7"/>
  <ellipse cx="44" cy="38" rx="3" ry="2" fill="#F5B7B1" opacity="0.7"/>
</svg>
